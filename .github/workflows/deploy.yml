name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build Frontend
        run: |
          cd apps/vuttik-pos-web
          npm install --no-package-lock
          npm run build

      - name: Install and Build Backend
        run: |
          cd apps/vuttik-pos-web/server
          npm install --no-package-lock
          npm install typescript
          npx tsc || true

      - name: Create Deployment Archive
        run: |
          mkdir deploy_package
          cp -r apps/vuttik-pos-web/dist deploy_package/
          cp -r apps/vuttik-pos-web/server deploy_package/
          tar -czf deploy.tar.gz -C deploy_package .

      - name: Deploy Frontend via FTP
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          
          echo "Deploying to vuttik.com/public_html..."
          cat << 'EOF' > lftp_script.txt
          set ssl:verify-certificate no
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ftp.vuttik.com
          mirror -R apps/vuttik-pos-web/dist /public_html
          bye
          EOF
          lftp -f lftp_script.txt
          
          # We try to deploy to pos.vuttik.com if accessible (might fail if jailed)
          echo "Attempting to deploy to pos.vuttik.com..."
          cat << 'EOF' > lftp_script_pos.txt
          set ssl:verify-certificate no
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ftp.vuttik.com
          mirror -R apps/vuttik-pos-web/dist /pos.vuttik.com/public_html || echo "Could not access pos.vuttik.com folder via this FTP account"
          bye
          EOF
          lftp -f lftp_script_pos.txt || true
