name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build Frontend
        run: |
          npm install
          npm run build

      - name: Install and Build Backend
        run: |
          cd server
          npm install
          npm install typescript
          npx tsc || true

      - name: Clean Remote Frontend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Safe removal of frontend assets
            find /home/sinagjwx/domains/vuttik.com/public_html/assets -mindepth 1 -delete || true

      - name: Deploy Frontend via scp
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/home/sinagjwx/domains/vuttik.com/public_html/"
          strip_components: 1

      - name: Deploy Backend via scp
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "server/*"
          target: "/home/sinagjwx/domains/vuttik.com/server/"
          strip_components: 1

      - name: Restart Backend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/sinagjwx/domains/vuttik.com/server
            export NODE_HOME="/home/sinagjwx/nodejs"
            export PATH="$NODE_HOME/bin:/usr/local/bin:/usr/bin:/bin:$PATH"
            npm install --production
            touch ../tmp/restart.txt
            pkill -9 lsnode || true
