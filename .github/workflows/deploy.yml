name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ─── Build Marketplace Frontend (vuttik-web) ──────────────────────────
      - name: Build Marketplace Frontend
        run: |
          cd apps/vuttik-web
          npm install --no-package-lock
          npm run build

      # ─── Build POS Frontend (vuttik-pos-web) ──────────────────────────────
      - name: Build POS Frontend
        run: |
          cd apps/vuttik-pos-web
          npm install --no-package-lock
          npm run build

      # ─── Build Backend ─────────────────────────────────────────────────────
      - name: Build Backend
        run: |
          cd apps/vuttik-pos-web/server
          npm install --no-package-lock
          npx tsc --noEmit false --outDir ./dist || true

      # ─── Package Artifacts ─────────────────────────────────────────────────
      - name: Package Artifacts
        run: |
          # Marketplace frontend
          tar -czf /tmp/vuttik_marketplace.tar.gz -C apps/vuttik-web/dist .

          # POS frontend
          tar -czf /tmp/vuttik_pos.tar.gz -C apps/vuttik-pos-web/dist .

          # Backend (server folder with compiled JS)
          mkdir -p /tmp/backend_pkg/server
          cp -r apps/vuttik-pos-web/server/. /tmp/backend_pkg/server/
          # Remove heavy dev files
          rm -rf /tmp/backend_pkg/server/node_modules
          tar -czf /tmp/vuttik_backend.tar.gz -C /tmp/backend_pkg .

      # ─── Setup SSH ─────────────────────────────────────────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # ─── Upload to VPS ─────────────────────────────────────────────────────
      - name: Upload Artifacts to VPS
        run: |
          scp -i ~/.ssh/id_ed25519 \
            /tmp/vuttik_marketplace.tar.gz \
            /tmp/vuttik_pos.tar.gz \
            /tmp/vuttik_backend.tar.gz \
            root@${{ secrets.SSH_HOST }}:/tmp/

      # ─── Deploy on VPS ─────────────────────────────────────────────────────
      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.SSH_HOST }} 'bash /var/www/vuttik/deploy.sh 2>&1'
