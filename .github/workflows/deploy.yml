name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build Frontend
        run: |
          npm install
          npm run build

      - name: Install and Build Backend
        run: |
          cd server
          npm install
          npm install typescript
          npx tsc || true

      - name: Create Deployment Archive
        run: |
          mkdir deploy_package
          cp -r dist deploy_package/
          cp -r server deploy_package/
          tar -czf deploy.tar.gz -C deploy_package .

      - name: Upload Deployment Archive
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "/home/sinagjwx/domains/vuttik.com/"

      - name: Extract, Clean, and Restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/sinagjwx/domains/vuttik.com/
            
            # Extract archive
            mkdir -p temp_deploy
            tar -xzf deploy.tar.gz -C temp_deploy
            
            # Clean remote frontend assets
            find public_html/assets -mindepth 1 -delete || true
            
            # Copy frontend files
            cp -r temp_deploy/dist/* public_html/
            
            # Copy backend files
            cp -r temp_deploy/server/* server/
            
            # Clean up deployment files
            rm -rf temp_deploy deploy.tar.gz
            
            # Restart backend
            cd server
            npm install --production
            
            # Restart LiteSpeed Node process
            touch ../tmp/restart.txt
            pkill -9 lsnode || true
